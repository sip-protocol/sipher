name: sipher

services:
  api:
    image: ghcr.io/sip-protocol/sipher:latest
    container_name: sipher
    restart: unless-stopped
    ports:
      - "5006:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - API_KEYS=${API_KEYS}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - SOLANA_RPC_URL=${SOLANA_RPC_URL:-https://api.mainnet-beta.solana.com}
      - SOLANA_RPC_URL_FALLBACK=${SOLANA_RPC_URL_FALLBACK:-}
      - SIPHER_HELIUS_API_KEY=${SIPHER_HELIUS_API_KEY:-}
      - RPC_PROVIDER=${RPC_PROVIDER:-generic}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://sipher.sip-protocol.org}
      - REDIS_URL=redis://redis:6379
      - TRUST_PROXY=${TRUST_PROXY:-1}
      - LOG_LEVEL=info
      - RATE_LIMIT_MAX=100
      - RATE_LIMIT_WINDOW_MS=60000
      # Phase 2 â€” Guardian Command
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRY=${JWT_EXPIRY:-24h}
      - SIPHER_ADMIN_PASSWORD=${SIPHER_ADMIN_PASSWORD}
      - AUTHORIZED_WALLETS=${AUTHORIZED_WALLETS:-}
      # Network config â€” loadNetworkConfig() reads SIPHER_NETWORK at boot and
      # FATAL-throws if unset (no silent mainnet fallback). The default 'devnet'
      # below matches the devnet-beta posture we ship with; flip to 'mainnet'
      # in the operator env when promoting to production.
      - SIPHER_NETWORK=${SIPHER_NETWORK:-devnet}
      - SOLANA_NETWORK=${SOLANA_NETWORK:-devnet}
      # SENTINEL â€” default 'advisory' is fail-safe; an explicit 'yolo' opts into
      # autonomous fund-moving operations and emits a startup warning.
      - SENTINEL_MODE=${SENTINEL_MODE:-advisory}
      - SENTINEL_AUTHORITY_KEYPAIR=${SENTINEL_AUTHORITY_KEYPAIR:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      # Sipher chat model â€” MUST use dot-form (e.g. claude-sonnet-4.6, NOT
      # claude-sonnet-4-6). Hyphen-form silently fails the getSipherModel
      # lookup and emits empty content with no error (issue #294/#293).
      - SIPHER_MODEL=${SIPHER_MODEL:-anthropic/claude-sonnet-4.6}
      # Torque growth integration â€” fail-closed by default; opt in with
      # TORQUE_GROWTH_ENABLED=true + TORQUE_API_TOKEN set.
      - TORQUE_GROWTH_ENABLED=${TORQUE_GROWTH_ENABLED:-false}
      - TORQUE_API_TOKEN=${TORQUE_API_TOKEN:-}
      - TORQUE_INGESTER_URL=${TORQUE_INGESTER_URL:-https://ingest.torque.so}
      - X_BEARER_TOKEN=${X_BEARER_TOKEN:-}
      - X_CONSUMER_KEY=${X_CONSUMER_KEY:-}
      - X_CONSUMER_SECRET=${X_CONSUMER_SECRET:-}
      - X_ACCESS_TOKEN=${X_ACCESS_TOKEN:-}
      - X_ACCESS_SECRET=${X_ACCESS_SECRET:-}
      - HERALD_MONTHLY_BUDGET=${HERALD_MONTHLY_BUDGET:-150}
      - JUPITER_API_URL=${JUPITER_API_URL:-https://lite-api.jup.ag}
      - JITO_BLOCK_ENGINE_URL=${JITO_BLOCK_ENGINE_URL:-}
      - SIPHER_BASE_URL=${SIPHER_BASE_URL:-https://sipher.sip-protocol.org}
    volumes:
      - sipher-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: sipher-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 100mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  redis-data:
  sipher-data:
